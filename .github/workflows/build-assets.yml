name: Build Assets

on:
  workflow_dispatch:

  push:
    paths:
      - 'resources/js/components/er-diagram.js'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v5
        with:
          version: 10
          run_install: false

      - uses: actions/setup-node@v6
        with:
          node-version: lts/*
          registry-url: https://registry.npmjs.org
          cache: pnpm

      - name: Install dependencies
        run: pnpm install

      - name: Build assets
        run: pnpm build

      - uses: stefanzweifel/git-auto-commit-action@v7
        with:
          commit_message: 'Build assets'
          commit_user_name: 'Bugo'
          commit_user_email: '229402+dragomano@users.noreply.github.com'
